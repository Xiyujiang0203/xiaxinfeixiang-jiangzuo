name: web

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-web:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          channel: "stable"
          cache: true

      - run: flutter pub get
      - run: flutter build web --release

      - uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web

